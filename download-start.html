<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloading... | 5 Star Links</title>
  <link rel="icon" type="image/png" href="pics/logo/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #050208; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .center { text-align: center; }
    .spinner { width: 60px; height: 60px; border: 4px solid rgba(168,85,247,0.2); border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p { color: #aaa; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .back-btn { display: inline-block; padding: 10px 24px; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: #a78bfa; border-radius: 10px; text-decoration: none; font-weight: 600; transition: all 0.3s; }
    .back-btn:hover { background: rgba(168,85,247,0.3); }
    .file-name { background: #1a1028; padding: 8px 16px; border-radius: 8px; color: #a855f7; font-family: monospace; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="center">
    <div class="spinner"></div>
    <h2>Download Starting...</h2>
    <div class="file-name" id="fileName"></div>
    <p>Your download should begin automatically.<br>If not, click the button below.</p>
    <a href="#" id="retryBtn" class="back-btn">Download Again</a>
    <br><br>
    <a href="download.html" class="back-btn">Back to Downloads</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fileId = params.get('id');
    const fileName = params.get('name') || 'file';

    document.getElementById('fileName').textContent = fileName;
    document.title = 'Downloading ' + fileName + ' | 5 Star Links';

    const directUrl = 'https://drive.google.com/uc?export=download&id=' + fileId;
    document.getElementById('retryBtn').href = directUrl;

    // Auto-start download
    if (fileId) {
      const a = document.createElement('a');
      a.href = directUrl;
      a.click();
    }
  </script>
</body>
</html>
