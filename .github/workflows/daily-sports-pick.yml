name: Post daily sports pick to Discord

on:
  schedule:
    - cron: '0 14 * * *' # 10am ET (9am during EDT) -- adjust if you want a different time
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to post picks for (YYYY-MM-DD). Leave blank for tomorrow.'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post picks to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_DEALS_WEBHOOK }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: node scripts/post-daily-pick.js
