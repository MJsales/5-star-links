<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5 Star Links</title>
  <link rel="icon" type="image/png" href="pics/logo/logo.png.png">
  <link rel="apple-touch-icon" href="pics/logo/logo.png.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050208;
      color: #fff;
      line-height: 1.5;
      min-height: 100vh;
    }
    .cart-btn {
      position: fixed; top: 1.2rem; right: 1.2rem; z-index: 100;
      background: rgba(168,85,247,0.15); backdrop-filter: blur(12px);
      border: 1px solid rgba(168,85,247,0.3); color: #fff;
      padding: 0.6rem 1.2rem; border-radius: 50px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: all 0.3s;
    }
    .cart-btn:hover { background: rgba(168,85,247,0.3); transform: scale(1.05); }
    .cart-btn .count {
      background: #a855f7; color: #fff; border-radius: 50%;
      padding: 2px 8px; font-size: 0.8rem; margin-left: 6px;
    }
    .header {
      position: relative; padding: 4rem 1rem 3rem; text-align: center;
      overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.15) 0%, transparent 60%);
    }
    .header h1 {
      font-size: 3.5rem; font-weight: 900; letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, #a855f7 50%, #7c3aed 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      position: relative;
    }
    .header p {
      margin-top: 0.5rem; font-size: 0.95rem; color: #a78bfa;
      letter-spacing: 5px; text-transform: uppercase; font-weight: 600;
      position: relative;
    }
    .logo-wrap {
      display: inline-block; position: relative; margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite; perspective: 600px;
    }
    .logo-wrap::after {
      content: ''; position: absolute; bottom: -16px; left: 50%;
      transform: translateX(-50%); width: 140px; height: 20px;
      background: radial-gradient(ellipse, rgba(168,85,247,0.4) 0%, transparent 70%);
      border-radius: 50%; animation: shadowPulse 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes shadowPulse {
      0%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.4; }
      50% { transform: translateX(-50%) scaleX(1.2); opacity: 0.7; }
    }
    .plush-3d {
      width: 220px; height: 220px; position: relative;
      transform-style: preserve-3d; animation: spinY 6s linear infinite;
    }
    .plush-face {
      position: absolute; inset: 0; backface-visibility: hidden;
    }
    .plush-front { transform: translateZ(1px); }
    .plush-front img {
      width: 220px; height: 220px; object-fit: contain; display: block;
      animation: logoGlow 4s ease-in-out infinite;
    }
    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(168,85,247,0.3)) brightness(1); }
      25% { filter: drop-shadow(0 0 20px rgba(168,85,247,0.7)) brightness(1.1); }
      50% { filter: drop-shadow(0 0 12px rgba(168,85,247,0.4)) brightness(1.05); }
      75% { filter: drop-shadow(0 0 25px rgba(168,85,247,0.8)) brightness(1.15); }
    }
    .plush-back {
      transform: rotateY(180deg) translateZ(1px);
      background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    }
    .plush-back .back-text {
      color: #a855f7; font-size: 3.5rem; font-weight: 900;
      text-shadow: 0 0 30px rgba(168,85,247,0.8), 0 0 60px rgba(168,85,247,0.4);
      animation: textGlow 3s ease-in-out infinite;
    }
    .plush-back .back-sub {
      color: #fff; font-size: 1.8rem; font-weight: 800; letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(168,85,247,0.6);
    }
    .plush-back .back-sub2 {
      color: #a855f7; font-size: 1.8rem; font-weight: 800; letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(168,85,247,0.6);
    }
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(168,85,247,0.5), 0 0 40px rgba(168,85,247,0.2); }
      50% { text-shadow: 0 0 40px rgba(168,85,247,0.9), 0 0 80px rgba(168,85,247,0.5); }
    }
    .plush-edge {
      position: absolute; inset: 0;
      background: #0a0510;
      transform: translateZ(calc(-1px * var(--i)));
    }
    @keyframes spinY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    .logo-drips {
      position: absolute; inset: 0; pointer-events: none;
      animation: spinY 6s linear infinite reverse;
      filter: drop-shadow(0 2px 4px rgba(168,85,247,0.4));
    }
    .logo-drips .drip { fill: none; stroke: #a855f7; stroke-width: 2; stroke-linecap: round; }
    .logo-drips .drip-fill { fill: #a855f7; }
    .drip-path { animation: dripFlow 2.5s ease-in-out infinite; }
    .drip-drop { animation: dripFall 2.5s ease-in-out infinite; }
    .drip-path-2 { animation: dripFlow 3s ease-in-out 0.5s infinite; }
    .drip-drop-2 { animation: dripFall 3s ease-in-out 0.5s infinite; }
    .drip-path-3 { animation: dripFlow 2.8s ease-in-out 1s infinite; }
    .drip-drop-3 { animation: dripFall 2.8s ease-in-out 1s infinite; }
    .drip-path-4 { animation: dripFlow 3.2s ease-in-out 0.3s infinite; }
    .drip-drop-4 { animation: dripFall 3.2s ease-in-out 0.3s infinite; }
    .drip-path-5 { animation: dripFlow 2.7s ease-in-out 0.8s infinite; }
    .drip-drop-5 { animation: dripFall 2.7s ease-in-out 0.8s infinite; }
    @keyframes dripFlow { 0%,100%{stroke-dashoffset:0;opacity:0.4} 50%{stroke-dashoffset:-30;opacity:1} }
    @keyframes dripFall { 0%,100%{transform:translateY(0);opacity:1} 50%{transform:translateY(8px);opacity:0.3} }

    .tagline {
      text-align: center; padding: 2rem 1rem 1rem;
    }
    .tagline span {
      display: inline-block; padding: 0.6rem 2rem;
      background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(124,58,237,0.1));
      border: 1px solid rgba(168,85,247,0.25); border-radius: 50px;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: #a78bfa;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem; margin-top: 1.5rem;
    }
    .card {
      background: linear-gradient(145deg, #0d0815 0%, #110a1a 100%);
      border: 1px solid rgba(168,85,247,0.15); border-radius: 16px;
      padding: 1.5rem; transition: all 0.3s;
    }
    .card:hover {
      border-color: rgba(168,85,247,0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(168,85,247,0.15);
    }
    .card-icon { text-align: center; padding: 1rem 0; }
    .card-icon svg { max-width: 140px; height: auto; }
    .card h3 {
      font-size: 1.2rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; margin-bottom: 0.3rem;
    }
    .card .price {
      color: #a855f7; font-size: 1.8rem; font-weight: 900;
    }
    .card .desc { color: #666; font-size: 0.85rem; margin: 0.5rem 0 1rem; }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin: 0.8rem 0; }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s; position: relative;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: #a855f7; }
    .color-dot.active::after {
      content: ''; position: absolute; inset: 3px; border-radius: 50%;
      border: 2px solid #fff; opacity: 0.5;
    }
    .add-btn {
      display: block; width: 100%; margin-top: 14px; padding: 0.75rem;
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
      border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.2s;
    }
    .add-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(168,85,247,0.4); }
    .footer {
      text-align: center; padding: 3rem 1rem; font-size: 0.85rem;
      color: #444; border-top: 1px solid rgba(168,85,247,0.1); margin-top: 2rem;
    }
    .footer strong { color: #a855f7; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
      padding: 0.8rem 2rem; border-radius: 40px; font-weight: 700;
      font-size: 0.95rem; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .auth-btn {
      position: fixed; top: 1.2rem; right: 14rem; z-index: 100;
      background: rgba(168,85,247,0.15); backdrop-filter: blur(12px);
      border: 1px solid rgba(168,85,247,0.3); color: #fff;
      padding: 0.6rem 1.2rem; border-radius: 50px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: all 0.3s;
    }
    .auth-btn:hover { background: rgba(168,85,247,0.3); transform: scale(1.05); }
    .auth-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .auth-overlay.active { display: flex; }
    .auth-modal {
      background: linear-gradient(145deg, #0d0815, #110a1a);
      border: 1px solid rgba(168,85,247,0.25); border-radius: 18px;
      padding: 2rem; width: 90%; max-width: 380px; position: relative;
    }
    .auth-modal h2 {
      margin-bottom: 1.5rem; font-size: 1.3rem; text-align: center;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-close {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: #555; font-size: 1.5rem; cursor: pointer;
    }
    .auth-close:hover { color: #fff; }
    .auth-input {
      width: 100%; padding: 12px; margin-bottom: 12px;
      background: #050208; border: 1px solid rgba(168,85,247,0.2);
      border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none;
    }
    .auth-input:focus { border-color: #a855f7; }
    .auth-input::placeholder { color: #555; }
    .auth-error { color: #c02828; font-size: 0.85rem; margin-bottom: 12px; min-height: 1.2em; }
    .auth-submit-btn {
      width: 100%; padding: 14px; margin-bottom: 12px;
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer;
    }
    .auth-submit-btn:hover { box-shadow: 0 6px 20px rgba(168,85,247,0.4); }
    .auth-switch { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 16px; }
    .auth-switch a { color: #a855f7; text-decoration: none; font-weight: 600; }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-divider { text-align: center; color: #444; margin-bottom: 16px; font-size: 0.85rem; }
    .auth-guest-btn {
      width: 100%; padding: 12px;
      background: rgba(168,85,247,0.1); color: #a855f7;
      border: 1px solid rgba(168,85,247,0.2); border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .auth-guest-btn:hover { background: rgba(168,85,247,0.2); }
  </style>
</head>

<button class="cart-btn" onclick="location.href='cart.html'">

<script>

  {

      <circle cx="100" cy="100" r="60" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.3"/>
      <text x="100" y="85" text-anchor="middle" fill="#a855f7" font-size="40" font-weight="900" font-family="Inter,sans-serif">AI</text>
      <text x="100" y="115" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Inter,sans-serif">SPORTS</text>
      <text x="100" y="135" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Inter,sans-serif">PICKS</text>
      <circle cx="100" cy="100" r="80" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="8 4" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
      </circle>
    </svg>`
  },
];

let selectedColors = {};

function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); }
function updateCount() {
  const count = getCart().reduce((s, i) => s + (i.quantity || 1), 0);
  document.getElementById('cartCount').textContent = count;
}

function addToCart(id) {
  const cart = getCart();
  const color = selectedColors[id] || null;
  const product = products.find(p => p.id === id);
  const existing = cart.find(i => i.id === id && i.color === color);
  if (existing) { existing.quantity = (existing.quantity || 1) + 1; }
  else { cart.push({ id, name: product.name, color, quantity: 1 }); }
  saveCart(cart);
  updateCount();
  if (window.authModule && window.authModule.getCurrentUser()) window.authModule.syncToCloud();
  showToast(`${product.name} added to cart!`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

function render() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => {
    const color = p.hasColors ? (selectedColors[p.id] || maskColors[0]) : null;
    const svg = p.hasColors ? p.svg(color) : p.svg();
    return `<div class="card">
      <div class="card-icon">${svg}</div>
      <h3>${p.name}</h3>
      <div class="price">$${p.price}</div>
      <div class="desc">${p.desc}</div>
      ${p.hasColors ? `<div class="color-picker">${maskColors.map(c =>
        `<div class="color-dot${(selectedColors[p.id] || maskColors[0].id) === c.id ? ' active' : ''}"
          style="background:${c.fill}" title="${c.name}"
          onclick="selectColor('${p.id}','${c.id}')"></div>`
      ).join('')}</div>` : ''}
      <button class="add-btn" onclick="addToCart('${p.id}')">Add to Cart</button>
    </div>`;
  }).join('');
}

function selectColor(productId, colorId) {
  selectedColors[productId] = colorId;
  render();
}

updateCount();
render();

let authMode = 'signin';
function toggleAuthMode(e) {
  e.preventDefault();
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  document.getElementById('authTitle').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
  document.getElementById('authNameWrap').style.display = authMode === 'signup' ? 'block' : 'none';
  document.getElementById('authSubmit').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
  document.getElementById('authSwitchText').textContent = authMode === 'signin' ? "Don't have an account?" : "Already have an account?";
  document.getElementById('authSwitchLink').textContent = authMode === 'signin' ? 'Sign Up' : 'Sign In';
  document.getElementById('authError').textContent = '';
}

async function handleAuthSubmit() {
  const name = document.getElementById('authName').value.trim();
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const err = document.getElementById('authError');
  err.textContent = '';

  if (!email || !pass) { err.textContent = 'Fill in all fields'; return; }
  if (authMode === 'signup' && !name) { err.textContent = 'Enter your name'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be 6+ characters'; return; }

  try {
    if (authMode === 'signup') {
      await authModule.signUp(name, email, pass);
    } else {
      await authModule.signIn(email, pass);
    }
    authModule.hideAuth();
    showToast('Signed in!');
  } catch (e) {
    err.textContent = e.message.replace('Firebase: ', '').replace(/\(auth\/.*?\)\.?/, '');
  }
}
</script>
