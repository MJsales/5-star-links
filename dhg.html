const catOrder = [
  "Jordan 1", "Jordan 3", "Jordan 4", "Jordan 5", "Jordan 11", "Jordan 14",
  "Nike Dunk", "Air Force 1", "Nike Kobe", "Balenciaga", "LV", "Rick Owens",
  "Amiri", "Bape", "Yeezy", "Off-White", "Other"
];

function getShoesByCat(cat) {
  return shoes.filter(s => s.cat === cat);
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('shoeGrid');
  const noRes = document.getElementById('noResults');
  let total = 0;
  let html = '';

  catOrder.forEach(cat => {
    const filtered = getShoesByCat(cat).filter(s => s.name.toLowerCase().includes(q));
    if (filtered.length === 0) return;
    total += filtered.length;
    html += `<div class="section-label">${cat} <span class="cat-count">${filtered.length}</span></div>`;
    html += `<div class="grid">`;
    filtered.forEach(s => {
      html += `<div class="card">
        <h3>${s.name}</h3>
        <a href="${s.link}" target="_blank" rel="noopener noreferrer">View on DHGate</a>
      </div>`;
    });
    html += `</div>`;
  });

  grid.innerHTML = html;
  document.getElementById('totalCount').textContent = total + ' shoes';
  noRes.classList.toggle('show', total === 0);
}

function filterShoes() { render(); }
render();
