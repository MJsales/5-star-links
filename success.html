<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Star Links - Order Confirmed</title>
  <link rel="icon" type="image/png" href="pics/logo/logo.png.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050208;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }
    .checkmark {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin-bottom: 2rem;
      animation: popIn 0.5s ease-out;
      box-shadow: 0 8px 40px rgba(168,85,247,0.4);
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #a78bfa; margin-bottom: 2rem; }
    .back-btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(168,85,247,0.4);
    }
  </style>
</head>
<body>
  <div class="checkmark">&#10003;</div>
  <h1>Order Confirmed!</h1>
  <p>Thank you for your purchase.</p>
  <a href="index.html" class="back-btn">Continue Shopping</a>
</body>
</html>
