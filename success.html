<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Star Links - Order Confirmed</title>
  <link rel="icon" type="image/png" href="pics/logo/favicon.png">
  <link rel="apple-touch-icon" href="pics/logo/logo.png.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050208;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #fff;
      padding: 2rem 1rem;
    }
    .checkmark {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin-bottom: 1.5rem;
      animation: popIn 0.5s ease-out;
      box-shadow: 0 8px 40px rgba(168,85,247,0.4);
    }
    @keyframes popIn {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #a78bfa; margin-bottom: 2rem; }
    .products {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
    }
    .product-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(145deg, #0d0815, #110a1a);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      text-decoration: none;
      transition: all 0.3s;
    }
    .product-link:hover {
      border-color: #a855f7;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(168,85,247,0.2);
    }
    .product-link .name {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
    }
    .product-link .arrow {
      color: #a855f7;
      font-size: 1.4rem;
    }
    .back-btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(168,85,247,0.4);
    }
  </style>
</head>
<body>
  <div class="checkmark">&#10003;</div>
  <h1>Order Confirmed!</h1>
  <p>Click below to get your item.</p>
  <div class="products" id="products"></div>
  <a href="index.html" class="back-btn">Continue Shopping</a>

  <script>
    const links = {
      'ski-mask': { name: 'Ski Mask', url: 'https://sale.dhgate.com/1rr3Zj83' },
      'spider-hoodie': { name: 'S Hoodie', url: 'https://sale.dhgate.com/7uzPO282' },
      'bape-hoodie': { name: 'B Hoodie', url: 'https://sale.dhgate.com/UMbuBr56' },
      'ai-picks': { name: 'AI Sports Picks', url: 'ai.html' },
      'ai-stocks': { name: 'AI Stock Picks', url: 'stocks.html' },
      'ai-video': { name: 'AI Video Splicer', url: 'video.html' }
    };

    // Returning from a redirect-based method (Klarna, Cash App Pay): Stripe
    // appends redirect_status. Finalize the pending purchase that cart.html
    // snapshotted before sending the buyer off-site.
    const params = new URLSearchParams(window.location.search);
    const redirectStatus = params.get('redirect_status');
    if (redirectStatus === 'succeeded' || redirectStatus === 'processing') {
      const pending = JSON.parse(localStorage.getItem('pendingPurchase') || '[]');
      if (pending.length) {
        const existing = JSON.parse(localStorage.getItem('purchasedItems') || '[]');
        localStorage.setItem('purchasedItems', JSON.stringify(existing.concat(pending)));
        localStorage.removeItem('pendingPurchase');
        localStorage.removeItem('cart');
      }
    } else if (redirectStatus === 'failed') {
      localStorage.removeItem('pendingPurchase');
      window.location.href = 'cart.html';
    }

    const cart = JSON.parse(localStorage.getItem('purchasedItems') || '[]');
    const container = document.getElementById('products');

    if (window.authModule && window.authModule.getCurrentUser() && cart.length > 0) {
      window.authModule.saveOrder(cart);
    }

    const seen = {};
    cart.forEach(item => {
      const link = links[item.id];
      if (link && !seen[item.id]) {
        seen[item.id] = true;
        const a = document.createElement('a');
        a.className = 'product-link';
        a.href = link.url;
        a.target = '_blank';
        a.innerHTML = `<span class="name">${link.name}</span><span class="arrow">&rarr;</span>`;
        container.appendChild(a);
      }
    });
  </script>
</body>
</html>
