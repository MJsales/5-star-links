<!DOCTYPE html>
<html>
<head>
    <title>Spinning Plushy Star</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a0a2e; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Create plushy star shape
        const starGroup = new THREE.Group();
        
        // Star parameters
        const outerRadius = 2;
        const innerRadius = 0.8;
        const points = 5;
        const thickness = 0.4;
        
        // Create star shape
        function createStarShape() {
            const shape = new THREE.Shape();
            for (let i = 0; i < points * 2; i++) {
                const angle = (i * Math.PI) / points - Math.PI / 2;
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);
                if (i === 0) shape.moveTo(x, y);
                else shape.lineTo(x, y);
            }
            shape.closePath();
            return shape;
        }
        
        // Extrude settings for plushy look
        const extrudeSettings = {
            steps: 2,
            depth: thickness,
            bevelEnabled: true,
            bevelThickness: 0.15,
            bevelSize: 0.1,
            bevelOffset: 0,
            bevelSegments: 8
        };
        
        const starGeometry = new THREE.ExtrudeGeometry(createStarShape(), extrudeSettings);
        starGeometry.center();
        
        // Plushy material - dark with slight sheen
        const plushMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        
        const starMesh = new THREE.Mesh(starGeometry, plushMaterial);
        starMesh.castShadow = true;
        starMesh.receiveShadow = true;
        starGroup.add(starMesh);
        
        // Add stitching lines
        const stitchMaterial = new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 2 });
        for (let i = 0; i < points * 2; i++) {
            const angle = (i * Math.PI) / points - Math.PI / 2;
            const radius = i % 2 === 0 ? outerRadius : innerRadius;
            const x = radius * Math.cos(angle);
            const y = radius * Math.sin(angle);
            
            const points_line = [
                new THREE.Vector3(0, 0, thickness/2 + 0.15),
                new THREE.Vector3(x * 0.9, y * 0.9, thickness/2 + 0.15)
            ];
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points_line);
            const line = new THREE.Line(lineGeometry, stitchMaterial);
            starGroup.add(line);
        }
        
        // Purple drips
        const dripMaterial = new THREE.MeshStandardMaterial({
            color: 0x8b00ff,
            roughness: 0.3,
            metalness: 0.6,
            side: THREE.DoubleSide
        });
        
        // Create drip shapes
        function createDrip(x, y, length) {
            const dripGroup = new THREE.Group();
            const dripGeometry = new THREE.CylinderGeometry(0.05, 0.02, length, 8);
            const drip = new THREE.Mesh(dripGeometry, dripMaterial);
            drip.position.set(x, y - length/2, thickness/2 + 0.1);
            drip.rotation.x = Math.PI / 2;
            dripGroup.add(drip);
            
            // Drip bulb at bottom
            const bulbGeometry = new THREE.SphereGeometry(0.08, 8, 8);
            const bulb = new THREE.Mesh(bulbGeometry, dripMaterial);
            bulb.position.set(x, y - length, thickness/2 + 0.1);
            dripGroup.add(bulb);
            
            return dripGroup;
        }
        
        // Add drips at star points
        for (let i = 0; i < points * 2; i += 2) {
            const angle = (i * Math.PI) / points - Math.PI / 2;
            const x = outerRadius * Math.cos(angle);
            const y = outerRadius * Math.sin(angle);
            const dripLength = 0.5 + Math.random() * 0.5;
            starGroup.add(createDrip(x, y, dripLength));
        }
        
        scene.add(starGroup);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        const purpleLight = new THREE.PointLight(0x8b00ff, 1, 20);
        purpleLight.position.set(-3, 2, 5);
        scene.add(purpleLight);
        
        camera.position.z = 5;
        
        // Animation
        function animate() {
            requestAnimationFrame(animate);
            starGroup.rotation.y += 0.01;
            starGroup.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
