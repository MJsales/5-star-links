<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sports Picks - 5 Star Links</title>
  <link rel="icon" type="image/png" href="pics/logo/logo.png.png">
  <link rel="apple-touch-icon" href="pics/logo/logo.png.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050208;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      background: rgba(13,8,21,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(168,85,247,0.15);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 {
      font-size: 1.3rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .back-btn {
      color: #a78bfa; text-decoration: none; font-weight: 600; font-size: 0.9rem;
    }
    .back-btn:hover { color: #fff; }
    .auth-btn-sm {
      background: rgba(168,85,247,0.15); backdrop-filter: blur(12px);
      border: 1px solid rgba(168,85,247,0.3); color: #fff;
      padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all 0.3s;
    }
    .auth-btn-sm:hover { background: rgba(168,85,247,0.3); }

    .chat-container {
      flex: 1; display: flex; flex-direction: column; max-width: 700px;
      margin: 0 auto; width: 100%; padding: 1rem;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1rem 0;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg {
      max-width: 80%; padding: 12px 16px; border-radius: 16px;
      font-size: 0.95rem; line-height: 1.5; animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user {
      align-self: flex-end; background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start; background: #110a1a;
      border: 1px solid rgba(168,85,247,0.15); border-bottom-left-radius: 4px;
    }
    .msg.ai .label {
      font-size: 0.75rem; font-weight: 700; color: #a855f7;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    .chat-input-wrap {
      display: flex; gap: 10px; padding: 1rem 0;
    }
    .chat-input {
      flex: 1; padding: 14px 18px; background: #110a1a;
      border: 1px solid rgba(168,85,247,0.2); border-radius: 12px;
      color: #fff; font-size: 1rem; outline: none; font-family: 'Inter', sans-serif;
    }
    .chat-input:focus { border-color: #a855f7; }
    .chat-input::placeholder { color: #555; }
    .send-btn {
      padding: 14px 20px; background: linear-gradient(135deg, #a855f7, #7c3aed);
      border: none; border-radius: 12px; color: #fff; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
    }
    .send-btn:hover { box-shadow: 0 6px 20px rgba(168,85,247,0.4); }

    .auth-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .auth-overlay.active { display: flex; }
    .auth-modal {
      background: linear-gradient(145deg, #0d0815, #110a1a);
      border: 1px solid rgba(168,85,247,0.25); border-radius: 18px;
      padding: 2rem; width: 90%; max-width: 380px; position: relative;
    }
    .auth-modal h2 {
      margin-bottom: 1.5rem; font-size: 1.3rem; text-align: center;
      background: linear-gradient(135deg, #fff, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-close {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: #555; font-size: 1.5rem; cursor: pointer;
    }
    .auth-close:hover { color: #fff; }
    .auth-input {
      width: 100%; padding: 12px; margin-bottom: 12px;
      background: #050208; border: 1px solid rgba(168,85,247,0.2);
      border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none;
    }
    .auth-input:focus { border-color: #a855f7; }
    .auth-input::placeholder { color: #555; }
    .auth-error { color: #c02828; font-size: 0.85rem; margin-bottom: 12px; min-height: 1.2em; }
    .auth-submit-btn {
      width: 100%; padding: 14px; margin-bottom: 12px;
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer;
    }
    .auth-submit-btn:hover { box-shadow: 0 6px 20px rgba(168,85,247,0.4); }
    .auth-switch { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 16px; }
    .auth-switch a { color: #a855f7; text-decoration: none; font-weight: 600; }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-divider { text-align: center; color: #444; margin-bottom: 16px; font-size: 0.85rem; }
    .auth-guest-btn {
      width: 100%; padding: 12px;
      background: rgba(168,85,247,0.1); color: #a855f7;
      border: 1px solid rgba(168,85,247,0.2); border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .auth-guest-btn:hover { background: rgba(168,85,247,0.2); }
  </style>
</head>
<body>

<div class="topbar">
  <h1>AI Sports Picks</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <button class="auth-btn-sm" id="authBtn" onclick="authModule.showAuth()">Sign In</button>
    <a href="index.html" class="back-btn">&larr; Shop</a>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-messages" id="chatMessages">
    <div class="msg ai">
      <div class="label">AI Sports Bot</div>
      Hey! Ask me about any upcoming game and I'll give you my best prediction. Try something like:<br><br>
      "Who wins Lakers vs Celtics?"<br>
      "Predict the Super Bowl"<br>
      "Yankees or Red Sox tonight?"
    </div>
  </div>
  <div class="chat-input-wrap">
    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about any game..." onkeypress="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" onclick="sendMsg()">Send</button>
  </div>
</div>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <button class="auth-close" onclick="authModule.hideAuth()">&times;</button>
    <h2 id="authTitle">Sign In</h2>
    <div id="authNameWrap" style="display:none">
      <input type="text" id="authName" class="auth-input" placeholder="Name" />
    </div>
    <input type="email" id="authEmail" class="auth-input" placeholder="Email" />
    <input type="password" id="authPass" class="auth-input" placeholder="Password" />
    <div id="authError" class="auth-error"></div>
    <button class="auth-submit-btn" id="authSubmit" onclick="handleAuthSubmit()">Sign In</button>
    <div class="auth-switch">
      <span id="authSwitchText">Don't have an account?</span>
      <a href="#" id="authSwitchLink" onclick="toggleAuthMode(event)">Sign Up</a>
    </div>
    <div class="auth-divider">or</div>
    <button class="auth-guest-btn" onclick="authModule.hideAuth()">Continue as Guest</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="auth.js"></script>
<script>
function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const messages = document.getElementById('chatMessages');
  messages.innerHTML += `<div class="msg user">${escHtml(text)}</div>`;
  messages.scrollTop = messages.scrollHeight;

  setTimeout(() => {
    const reply = generatePrediction(text);
    messages.innerHTML += `<div class="msg ai"><div class="label">AI Sports Bot</div>${reply}</div>`;
    messages.scrollTop = messages.scrollHeight;
  }, 800 + Math.random() * 1200);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const teams = {
  nfl: ['Chiefs','Bills','Ravens','49ers','Cowboys','Eagles','Lions','Dolphins','Bengals','Texans','Jets','Browns','Jaguars','Chargers','Broncos','Raiders','Steelers','Colts','Seahawks','Rams','Packers','Vikings','Buccaneers','Saints','Falcons','Panthers','Cardinals','Commanders','Giants','Patriots','Titans'],
  nba: ['Lakers','Celtics','Nuggets','Thunder','Timberwolves','Knicks','Cavaliers','Warriors','Suns','Mavericks','Bucks','76ers','Clippers','Kings','Heat','Pacers','Pelicans','Rockets','Bulls','Hawks','Hornets','Nets','Raptors','Spurs','Blazers','Jazz','Pistons','Wizards','Magic'],
  mlb: ['Yankees','Dodgers','Astros','Braves','Phillies','Rangers','Orioles','Twins','Guardians','Rays','Blue Jays','Mariners','Red Sox','Cardinals','Mets','Brewers','Padres','Diamondbacks','Giants','Cubs','Angels','Tigers','Reds','Royals','Pirates','Marlins','Rockies','Athletics','Nationals','White Sox'],
  nhl: ['Panthers','Oilers','Rangers','Stars','Bruins','Canucks','Avalanche','Jets','Hurricanes','Wild','Knights','Kings','Blues','Flames','Lightning','Maple Leafs','Devils','Capitals','Islanders','Predators','Senators','Sabres','Red Wings','Flyers','Blackhawks','Ducks','Sharks','Coyotes','Blue Jackets','Penguins']
};

const today = new Date();
function futureDate(daysAhead) {
  const d = new Date(today);
  d.setDate(d.getDate() + daysAhead);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

const scheduledGames = [
  { sport: 'nfl', home: 'Chiefs', away: 'Bills', date: futureDate(2), confirmed: true },
  { sport: 'nfl', home: 'Cowboys', away: 'Eagles', date: futureDate(3), confirmed: true },
  { sport: 'nfl', home: 'Lions', away: '49ers', date: futureDate(4), confirmed: true },
  { sport: 'nfl', home: 'Ravens', away: 'Bengals', date: futureDate(5), confirmed: true },
  { sport: 'nfl', home: 'Dolphins', away: 'Jets', date: futureDate(6), confirmed: true },
  { sport: 'nfl', home: 'Steelers', away: 'Colts', date: futureDate(8), confirmed: true },
  { sport: 'nfl', home: 'Packers', away: 'Vikings', date: futureDate(9), confirmed: true },
  { sport: 'nfl', home: 'Buccaneers', away: 'Saints', date: futureDate(10), confirmed: true },
  { sport: 'nba', home: 'Lakers', away: 'Celtics', date: futureDate(1), confirmed: true },
  { sport: 'nba', home: 'Warriors', away: 'Nuggets', date: futureDate(2), confirmed: true },
  { sport: 'nba', home: 'Knicks', away: 'Bucks', date: futureDate(3), confirmed: true },
  { sport: 'nba', home: 'Thunder', away: 'Mavericks', date: futureDate(4), confirmed: true },
  { sport: 'nba', home: 'Suns', away: 'Clippers', date: futureDate(5), confirmed: true },
  { sport: 'nba', home: 'Heat', away: '76ers', date: futureDate(6), confirmed: true },
  { sport: 'nba', home: 'Kings', away: 'Timberwolves', date: futureDate(7), confirmed: true },
  { sport: 'nba', home: 'Cavaliers', away: 'Pacers', date: futureDate(8), confirmed: true },
  { sport: 'mlb', home: 'Yankees', away: 'Red Sox', date: futureDate(1), confirmed: true },
  { sport: 'mlb', home: 'Dodgers', away: 'Giants', date: futureDate(2), confirmed: true },
  { sport: 'mlb', home: 'Astros', away: 'Rangers', date: futureDate(3), confirmed: true },
  { sport: 'mlb', home: 'Braves', away: 'Phillies', date: futureDate(4), confirmed: true },
  { sport: 'mlb', home: 'Cubs', away: 'Cardinals', date: futureDate(5), confirmed: true },
  { sport: 'mlb', home: 'Mariners', away: 'Blue Jays', date: futureDate(6), confirmed: true },
  { sport: 'mlb', home: 'Padres', away: 'Diamondbacks', date: futureDate(7), confirmed: true },
  { sport: 'mlb', home: 'Mets', away: 'Brewers', date: futureDate(8), confirmed: true },
  { sport: 'nhl', home: 'Panthers', away: 'Rangers', date: futureDate(1), confirmed: true },
  { sport: 'nhl', home: 'Oilers', away: 'Stars', date: futureDate(2), confirmed: true },
  { sport: 'nhl', home: 'Bruins', away: 'Maple Leafs', date: futureDate(3), confirmed: true },
  { sport: 'nhl', home: 'Avalanche', away: 'Jets', date: futureDate(4), confirmed: true },
  { sport: 'nhl', home: 'Hurricanes', away: 'Devils', date: futureDate(5), confirmed: true },
  { sport: 'nhl', home: 'Lightning', away: 'Capitals', date: futureDate(6), confirmed: true },
  { sport: 'nhl', home: 'Golden Knights', away: 'Kings', date: futureDate(7), confirmed: true },
  { sport: 'nhl', home: 'Penguins', away: 'Flyers', date: futureDate(9), confirmed: true },
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function pct() { return randInt(51,89); }

function findGameByTeams(input) {
  const lower = input.toLowerCase();
  return scheduledGames.find(g => {
    const home = g.home.toLowerCase();
    const away = g.away.toLowerCase();
    return lower.includes(home) && lower.includes(away) || lower.includes(away) && lower.includes(home);
  });
}

function findSportFromInput(input) {
  const lower = input.toLowerCase();
  if (lower.match(/\b(nfl|football)\b/)) return 'nfl';
  if (lower.match(/\b(nba|basketball)\b/)) return 'nba';
  if (lower.match(/\b(mlb|baseball)\b/)) return 'mlb';
  if (lower.match(/\b(nhl|hockey)\b/)) return 'nhl';
  return null;
}

function getGamesBySport(sport) {
  return scheduledGames.filter(g => g.sport === sport);
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash |= 0;
  }
  return Math.abs(hash);
}

function pickSeeded(arr, rng) {
  return arr[Math.floor(rng() * arr.length)];
}

function generatePrediction(input) {
  const lower = input.toLowerCase();
  const seed = hashString(lower + today.toISOString().slice(0, 10));
  const rng = seededRandom(seed);

  const greetings = ['hello','hi','hey','sup','yo'];
  if (greetings.some(g => lower.startsWith(g))) {
    const upcoming = scheduledGames.slice(0, 5);
    return `Hey! Here are confirmed upcoming games:<br><br>` +
      upcoming.map(g => `• ${g.date}: ${g.away} @ ${g.home} (${g.sport.toUpperCase()})`).join('<br>') +
      `<br><br>Ask me about any of these games and I'll give you my pick!`;
  }

  if (lower.includes('schedule') || lower.includes('upcoming') || lower.includes('what games')) {
    const sport = findSportFromInput(lower);
    if (sport) {
      const games = getGamesBySport(sport);
      if (games.length === 0) return `No confirmed ${sport.toUpperCase()} games on the schedule right now.`;
      return `📅 <b>Confirmed ${sport.toUpperCase()} Games</b><br><br>` +
        games.map(g => `${g.date}: ${g.away} @ ${g.home}`).join('<br>');
    }
    return `📅 <b>All Confirmed Games</b><br><br>` +
      scheduledGames.map(g => `${g.date}: ${g.away} @ ${g.home} (${g.sport.toUpperCase()})`).join('<br>');
  }

  const game = findGameByTeams(input);
  if (game) {
    const pickTeam = rng() > 0.5 ? game.home : game.away;
    const confidence = 51 + Math.floor(rng() * 39);
    const margins = ['1-3 points','3-7 points','7-14 points','10+ points','in overtime','by a touchdown','by a field goal','in extra innings'];
    const reasons = [
      'The home crowd advantage and recent form give them the edge.',
      'Their defense has been stifling lately and I expect that to continue.',
      'Offensive firepower wins games. They have the better scoring attack.',
      'Head-to-head history favors them, and I think that trend continues.',
      'Injuries are stacking up for the other side. This is the spot.',
      'They are the more experienced team in big moments.',
      'The momentum from last week carries over here.',
      'Coaching adjustments will be the difference maker.',
      'The stats and advanced metrics all point this direction.',
      'Gut feeling on this one — they show up big tonight.'
    ];
    return `<b>${game.away} @ ${game.home}</b> (${game.sport.toUpperCase()})<br>Date: ${game.date} ✅<br><br>` +
      `My pick: <b>${pickTeam}</b><br>` +
      `Confidence: <b>${confidence}%</b><br>` +
      `Predicted margin: ${pickSeeded(margins, rng)}<br><br>` +
      `${pickSeeded(reasons, rng)}<br><br>` +
      `<i>Disclaimer: AI-generated predictions for entertainment only. Bet responsibly.</i>`;
  }

  const sport = findSportFromInput(lower);
  if (sport) {
    const games = getGamesBySport(sport);
    if (games.length === 0) return `No confirmed ${sport.toUpperCase()} games on the schedule right now.`;
    const game = pickSeeded(games, rng);
    const pickTeam = rng() > 0.5 ? game.home : game.away;
    return `Here's the next confirmed ${sport.toUpperCase()} game:<br><br>` +
      `<b>${game.away} @ ${game.home}</b><br>Date: ${game.date} ✅<br><br>` +
      `My pick: <b>${pickTeam}</b><br>` +
      `Confidence: <b>${51 + Math.floor(rng() * 39)}%</b><br><br>` +
      `<i>Disclaimer: AI-generated predictions for entertainment only.</i>`;
  }

  const game = pickSeeded(scheduledGames, rng);
  const pickTeam = rng() > 0.5 ? game.home : game.away;
  return `I only predict confirmed upcoming games. Here's what's scheduled:<br><br>` +
    scheduledGames.slice(0, 6).map(g => `• ${g.date}: ${g.away} @ ${g.home} (${g.sport.toUpperCase()})`).join('<br>') +
    `<br><br>Ask me about any of these matchups!<br><br>` +
    `<i>Disclaimer: AI-generated predictions for entertainment only.</i>`;
}

let authMode = 'signin';
function toggleAuthMode(e) {
  e.preventDefault();
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  document.getElementById('authTitle').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
  document.getElementById('authNameWrap').style.display = authMode === 'signup' ? 'block' : 'none';
  document.getElementById('authSubmit').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
  document.getElementById('authSwitchText').textContent = authMode === 'signin' ? "Don't have an account?" : "Already have an account?";
  document.getElementById('authSwitchLink').textContent = authMode === 'signin' ? 'Sign Up' : 'Sign In';
  document.getElementById('authError').textContent = '';
}

async function handleAuthSubmit() {
  const name = document.getElementById('authName').value.trim();
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const err = document.getElementById('authError');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Fill in all fields'; return; }
  if (authMode === 'signup' && !name) { err.textContent = 'Enter your name'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be 6+ characters'; return; }
  try {
    if (authMode === 'signup') await authModule.signUp(name, email, pass);
    else await authModule.signIn(email, pass);
    authModule.hideAuth();
  } catch (e) {
    err.textContent = e.message.replace('Firebase: ', '').replace(/\(auth\/.*?\)\.?/, '');
  }
}
</script>
</body>
</html>
